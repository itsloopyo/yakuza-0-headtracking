name: Build

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

jobs:
  build:
    name: Build and Validate
    runs-on: windows-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'Release v') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Visual Studio environment
        uses: microsoft/setup-msbuild@v3

      - name: Configure CMake (x64)
        shell: pwsh
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        shell: pwsh
        run: cmake --build build --config Release

      - name: Run tests
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Verify build outputs
        shell: pwsh
        run: |
          $asi = "bin/Release/Yakuza0HeadTracking.asi"
          if (-not (Test-Path $asi)) {
            Write-Host "::error::Missing $asi"
            exit 1
          }
          $size = [math]::Round((Get-Item $asi).Length / 1KB, 2)
          Write-Host "$asi ($size KB)" -ForegroundColor Green

      - name: Package installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/package-release.ps1

      - name: Compute artifact name from ref
        shell: pwsh
        run: |
          $branch = if ($env:GITHUB_HEAD_REF) { $env:GITHUB_HEAD_REF } else { $env:GITHUB_REF_NAME }
          $sanitized = $branch -replace '[^A-Za-z0-9._-]', '-'
          "ARTIFACT_NAME=Yakuza0HeadTracking-$sanitized" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: release/artifact-contents/
          retention-days: 14
          if-no-files-found: error
